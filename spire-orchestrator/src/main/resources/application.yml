quarkus:
  application:
    name: spire-orchestrator
  http:
    port: ${ORCHESTRATOR_HTTP_PORT:34080}   # host-exposed port lives in the 34xxx project range
  datasource:
    db-kind: postgresql
    jdbc:
      additional-jdbc-properties:
        currentSchema: orchestrator
  flyway:
    migrate-at-start: true
    # schema-per-service: the orchestrator owns the event log.
    default-schema: orchestrator
    create-schemas: true
  # Structured JSON logs in prod (observability rule); %dev/%test flip back to
  # plain console below. service/env ride on every line as static fields.
  log:
    console:
      json:
        enabled: true
        additional-field:
          service:
            value: spire-orchestrator
          env:
            value: ${quarkus.profile}

# cs.* topics (CONTRACT §9), all keyed by reviewId. Broker address from
# KAFKA_BOOTSTRAP_SERVERS; Dev Services boots one in dev/test when unset.
mp:
  messaging:
    outgoing:
      integration-out:               # dev simulator only
        connector: smallrye-kafka
        topic: cs.integration
        key:
          serializer: org.apache.kafka.common.serialization.StringSerializer
        value:
          serializer: dev.codespire.orchestrator.pipeline.IntegrationEventSerializer
      commands-out:
        connector: smallrye-kafka
        topic: cs.commands
        key:
          serializer: org.apache.kafka.common.serialization.StringSerializer
        value:
          serializer: dev.codespire.orchestrator.pipeline.ActionCommandSerializer
      events-out:
        connector: smallrye-kafka
        topic: cs.events
        key:
          serializer: org.apache.kafka.common.serialization.StringSerializer
        value:
          serializer: io.quarkus.kafka.client.serialization.ObjectMapperSerializer
    incoming:
      integration-in:
        connector: smallrye-kafka
        topic: cs.integration
        group:
          id: spire-orchestrator-integration
        value:
          deserializer: dev.codespire.orchestrator.pipeline.IntegrationEventDeserializer
        # work queue: a NEW consumer group must not replay history (M6);
        # processing failures go to cs.dlq, never silently dropped (ADR-013)
        auto:
          offset:
            reset: latest
        failure-strategy: dead-letter-queue
        dead-letter-queue:
          topic: cs.dlq
      results-in:
        connector: smallrye-kafka
        topic: cs.results
        group:
          id: spire-orchestrator-results
        value:
          deserializer: dev.codespire.orchestrator.pipeline.IntegrationEventDeserializer
        auto:
          offset:
            reset: latest
        failure-strategy: dead-letter-queue
        dead-letter-queue:
          topic: cs.dlq
      events-in:
        connector: smallrye-kafka
        topic: cs.events
        group:
          id: spire-orchestrator-view
        value:
          deserializer: dev.codespire.orchestrator.eventstore.EnvelopeDeserializer
        # projector: rebuildable read model — earliest replay is correct; consumer
        # failures still land on cs.dlq (never silently dropped, ADR-013), because
        # an ignored failure here can lose a terminal status flip forever.
        auto:
          offset:
            reset: earliest
        failure-strategy: dead-letter-queue
        dead-letter-queue:
          topic: cs.dlq
          # the DLQ producer cannot mirror the custom EnvelopeDeserializer by
          # name — reuse the envelope serializer events-out publishes with
          value:
            serializer: io.quarkus.kafka.client.serialization.ObjectMapperSerializer

# Global review mode (see ReviewPolicy). observe = register PR events, emit no
# work (no diff/LLM/comments). The per-provider author allowlist lives in the
# provider registry, not here.
# NOTE: `mode` here is only the SEED default. The live value lives in the DB
# (app_setting, key review.mode) and is toggled from Settings -> Providers without
# a restart; once set there, the stored value wins and this env var is ignored.
spire:
  review:
    mode: ${SPIRE_REVIEW_MODE:active}
    # Bounded auto-retry (C8/ADR-016): total pipeline runs before a transient
    # failure fails terminally. Tuning knob — a safe default is fine here.
    max-attempts: ${SPIRE_REVIEW_MAX_ATTEMPTS:3}
  security:
    # SSRF guard (CWE-918): provider baseUrl must be https and resolve to a
    # public address, because create/update whoami()s it server-side. Fail-closed
    # here; only %dev/%test relax it for http://localhost WireMock SCMs.
    allow-insecure-provider-urls: false

# Dev: docker-compose Postgres + Redpanda. Credentials come from .env (Quarkus
# loads it from the project root) — NO defaults for credentials, fail fast.
"%dev":
  spire:
    security:
      allow-insecure-provider-urls: true   # local WireMock/simulator SCMs are http://localhost
  kafka:
    bootstrap:
      servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:34092}
  quarkus:
    log:
      console:
        json:
          enabled: false   # plain console for local readability
    datasource:
      username: ${POSTGRES_USER}
      password: ${POSTGRES_PASSWORD}
      jdbc:
        url: jdbc:postgresql://localhost:${POSTGRES_PORT:34432}/${POSTGRES_DB:spire}

# Test: DevServices boot Postgres + a broker automatically.
"%test":
  spire:
    security:
      allow-insecure-provider-urls: true   # tests register providers against http://localhost WireMocks
    encryption:
      # Test-only AES-GCM keyset (not a secret). Prod/dev read SPIRE_ENCRYPTION_KEYSET.
      keyset: 
  quarkus:
    http:
      port: 0
      test-port: 0
    log:
      console:
        json:
          enabled: false   # plain console keeps test output readable
  mp:
    messaging:
      incoming:
        integration-in:
          auto:
            offset:
              reset: earliest
        results-in:
          auto:
            offset:
              reset: earliest
