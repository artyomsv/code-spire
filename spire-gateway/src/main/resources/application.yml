quarkus:
  application:
    name: spire-gateway
  http:
    port: ${GATEWAY_HTTP_PORT:34081}   # host-exposed port in the 34xxx project range
  # The gateway OWNS the per-repo webhook registry (its own schema). Same Postgres
  # as the orchestrator, but a schema-scoped role (GATEWAY_POSTGRES_*) with no access
  # to the orchestrator schema — a compromised edge cannot read the API-token registry.
  datasource:
    db-kind: postgresql
    jdbc:
      additional-jdbc-properties:
        currentSchema: gateway
  flyway:
    migrate-at-start: true
    default-schema: gateway
    create-schemas: true
  # Structured JSON logs in prod (observability rule); %dev/%test flip back to
  # plain console below. service/env ride on every line as static fields.
  log:
    console:
      json:
        enabled: true
        additional-field:
          service:
            value: spire-gateway
          env:
            value: ${quarkus.profile}

# Every SCM webhook is a per-repo registry edge routed by key
# (/webhooks/{provider}/{key}) — the secret is resolved per registration from the
# gateway's own webhook_repo table. Which SCMs are reviewed is the UI registry; no
# provider flag or global webhook secret exists.

spire:
  review:
    # Draft PRs are skipped on open/synchronize by default; the review fires on
    # ready_for_review instead. Set true to review drafts immediately (old behavior).
    draft-prs: false

# cs.integration: keyed by reviewId, JSON-serialized IntegrationEvent
# (CONTRACT §9). Broker address comes from KAFKA_BOOTSTRAP_SERVERS
# (kafka.bootstrap.servers); Dev Services boots a broker in dev/test when unset.
mp:
  messaging:
    outgoing:
      integration-out:
        connector: smallrye-kafka
        topic: cs.integration
        key:
          serializer: org.apache.kafka.common.serialization.StringSerializer
        value:
          serializer: dev.codespire.gateway.IntegrationEventSerializer

"%dev":
  quarkus:
    log:
      console:
        json:
          enabled: false   # plain console for local readability
    datasource:
      username: ${GATEWAY_POSTGRES_USER}
      password: ${GATEWAY_POSTGRES_PASSWORD}
      jdbc:
        url: jdbc:postgresql://localhost:${POSTGRES_PORT:34432}/${POSTGRES_DB:spire}
  kafka:
    bootstrap:
      servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:34092}

"%test":
  quarkus:
    http:
      port: 0
      test-port: 0
    log:
      console:
        json:
          enabled: false   # plain console keeps test output readable
  spire:
    encryption:
      # Test-only webhook keyset (not a secret) — matches the orchestrator's so a
      # secret encrypted there decrypts here. Prod/dev read SPIRE_ENCRYPTION_WEBHOOK_KEYSET.
      webhook-keyset: 
