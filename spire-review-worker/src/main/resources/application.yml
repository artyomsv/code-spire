quarkus:
  application:
    name: spire-review-worker
  http:
    port: ${WORKER_HTTP_PORT:34082}   # health endpoint only; 34xxx project range
  datasource:
    db-kind: postgresql
    jdbc:
      additional-jdbc-properties:
        currentSchema: worker
  flyway:
    migrate-at-start: true
    # schema-per-service (ADR-011/DATA-MODEL): the worker owns ONLY
    # comment_idempotency, in its own schema.
    default-schema: worker
    create-schemas: true
  # Structured JSON logs in prod (observability rule); %dev/%test flip back to
  # plain console below. service/env ride on every line as static fields.
  log:
    console:
      json:
        enabled: true
        additional-field:
          service:
            value: spire-review-worker
          env:
            value: ${quarkus.profile}

# Providers (ADR-001 fail-fast — no defaults outside dev/test). Credentials map
# canonically from env (SPIRE_SCM_BITBUCKET_*, SPIRE_LLM_*, see .env.example).
spire:
  # scm.provider defaults to "active" in code (WorkerScmClients): the worker routes
  # the per-command credential the orchestrator brokers. Set it to "stub" only for
  # the local canned demo (SMOKE-TEST Mode A) — %test does so below.
  llm:
    # Mode flag only (NOT credentials): stub forces the canned dev/test LLM;
    # registry uses the per-command brokered credential from the LLM provider
    # registry (Settings -> LLM, ADR-018). No SPIRE_LLM_BASE_URL/API_KEY/MODEL.
    provider: ${SPIRE_LLM_PROVIDER:registry}   # stub | registry

mp:
  messaging:
    incoming:
      commands-in:
        connector: smallrye-kafka
        topic: cs.commands
        group:
          id: spire-review-worker
        value:
          deserializer: dev.codespire.worker.pipeline.ActionCommandDeserializer
        # work queue: a NEW consumer group must not replay side effects (M6).
        # Poison records: the deserializer maps them to null (skipped, logged);
        # processing failures go to cs.dlq (ADR-013).
        auto:
          offset:
            reset: latest
        failure-strategy: dead-letter-queue
        dead-letter-queue:
          topic: cs.dlq
    outgoing:
      results-out:
        connector: smallrye-kafka
        topic: cs.results
        key:
          serializer: org.apache.kafka.common.serialization.StringSerializer
        value:
          serializer: dev.codespire.worker.pipeline.IntegrationEventSerializer

"%dev":
  kafka:
    bootstrap:
      servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:34092}
  quarkus:
    log:
      console:
        json:
          enabled: false   # plain console for local readability
    datasource:
      username: ${POSTGRES_USER}
      password: ${POSTGRES_PASSWORD}
      jdbc:
        url: jdbc:postgresql://localhost:${POSTGRES_PORT:34432}/${POSTGRES_DB:spire}
  spire:
    # scm.stub is false in dev -> real reviews against the brokered credential.
    # Export SPIRE_SCM_STUB=true for the canned stub demo (Mode A).
    llm:
      provider: ${SPIRE_LLM_PROVIDER:stub}

# Test: DevServices boot Postgres + a broker automatically.
"%test":
  quarkus:
    http:
      port: 0
      test-port: 0
    log:
      console:
        json:
          enabled: false   # plain console keeps test output readable
  mp:
    messaging:
      incoming:
        commands-in:
          auto:
            offset:
              reset: earliest
  spire:
    scm:
      stub: true                       # worker tests use stub SCM adapters by default
    llm:
      provider: stub
    encryption:
      # Test-only AES-GCM keyset (not a secret) — matches the orchestrator's, so
      # a worker test could decrypt a credential the orchestrator packed. Prod/dev
      # read SPIRE_ENCRYPTION_KEYSET (ADR-015).
      keyset: 
